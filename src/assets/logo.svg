<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Dark Mode / Focus Coach Gradient (Calming Teal/Cyan) -->
    <linearGradient id="auraFocus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Supportive Mentor Gradient (Warm Amber/Rose) -->
    <linearGradient id="auraMentor" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Push Mode Gradient (High Energy Crimson/Orange) -->
    <linearGradient id="auraPush" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>

    <!-- Deep Glow Filter to make it look premium & AI-driven -->
    <filter id="auraGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer for standalone viewing (Transparent in app) -->
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(400, 400)" filter="url(#auraGlow)">
    <!-- Core Ambient Shifting Node 1 -->
    <path d="M-180,-60 C-60,-180 60,180 180,60 C260,-20 220,-140 140,-180 C40,-230 -60,-80 -140,20 C-200,100 -260,40 -180,-60 Z" 
          fill="url(#auraFocus)" 
          opacity="0.85" />

    <!-- Core Ambient Shifting Node 2 (Overlay creating the adaptive wave) -->
    <path d="M160,80 C40,200 -80,-160 -200,-40 C-280,40 -200,160 -120,180 C-20,200 80,60 160,-40 C220,-120 240,-40 160,80 Z" 
          fill="url(#auraMentor)" 
          opacity="0.75" 
          style="mix-blend-mode: screen;" />
          
    <!-- Central Bright Cognitive Core (The 'AI' spark) -->
    <circle cx="0" cy="0" r="45" fill="#ffffff" opacity="0.9" filter="url(#auraGlow)" />
  </g>
</svg>
