<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AURA - Empathy-Adaptive Student Well-Being Copilot. Dynamic scheduling optimization, cognitive load index calculation, and real-time burnout forecasting." />
    <meta name="keywords" content="student well-being, cognitive load index, burnout forecasting, productivity coach, empathy-adaptive UI, SheCoders" />
    <meta name="author" content="Team SheCoders" />

    <!-- Favicon (uses the existing brand mark, no extra asset needed) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#6366f1" />

    <!-- Tells the browser chrome / status bar what color to use in each mode -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Stops iOS/Android from auto-linking numbers/dates as if they were phone numbers -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AURA - Empathy-Adaptive Student Well-Being & Scheduling Platform" />
    <meta property="og:description" content="Simulates real-time student workloads, notification intrusions, and biometric recovery indexes to dynamically scale interface urgency." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="AURA Student Platform" />
    <meta property="twitter:description" content="Dynamic scheduling and cognitive load index calculations built for student wellness." />

    <title>AURA - Empathy-Adaptive Student Well-Being &amp; SCLI Core Engine</title>

    <!-- Inline, dependency-free first-paint loader: shows instantly (no JS/CSS
         file round-trip needed) so visitors never see a blank white/blank flash
         while React and the app bundle load. main.jsx removes it once mounted. -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        transition: opacity 0.3s ease;
      }
      #initial-loader .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(99, 102, 241, 0.25);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: aura-spin 0.7s linear infinite;
      }
      @keyframes aura-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-loader .spinner { animation: none; }
      }
    </style>
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased">
    <div id="initial-loader" aria-hidden="true"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
